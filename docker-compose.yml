version: '3.8'

services:
  # 1. User Service (Port 5001)
  user-service:
    build: ./user-service
    ports:
      - "5002:5002"
    restart: always

  # 2. Auth Service (Port 5002)
  auth-service:
    build: ./auth-service
    ports:
      - "5002:5002"
    restart: always

  # 3. LocalStack (Fake AWS - Port 4566)
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,iam,lambda  # Jo services chahiye
      - ACTIVATE_PRO=0
      - DEBUG=1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1 
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: always 