apiVersion: v1
kind: Endpoints
metadata:
  name: localstack
subsets:
  - addresses:
      - ip: 192.168.49.1  # Ye Minikube ka default gateway IP hota hai
    ports:
      - port: 4566
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  ports:
    - port: 4566
      targetPort: 4566